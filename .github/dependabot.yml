version: 2
updates:
  # npm依存関係の更新
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'saturday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
      - 'dependabot'
    # major 更新は doc/DEPENDENCY_POLICY.md の四半期レビューで扱う
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    # グループ化して複数の依存関係を1つのPRにまとめる
    groups:
      production-dependencies:
        dependency-type: 'production'
      development-dependencies:
        dependency-type: 'development'

  # GitHub Actionsの更新
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'saturday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 1
    labels:
      - 'dependencies'
      - 'dependabot'
      - 'github-actions'
    # major 更新は doc/DEPENDENCY_POLICY.md の四半期レビューで扱う
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
