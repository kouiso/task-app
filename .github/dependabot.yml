version: 2
updates:
  # npm依存関係の更新
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'saturday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'dependabot'
    # セキュリティ設定
    insecure-external-code-execution: deny
    # グループ化して複数の依存関係を1つのPRにまとめる
    groups:
      production-dependencies:
        dependency-type: 'production'
      development-dependencies:
        dependency-type: 'development'

  # GitHub Actionsの更新
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'saturday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'dependabot'
      - 'github-actions'
    # セキュリティ設定
    insecure-external-code-execution: deny
