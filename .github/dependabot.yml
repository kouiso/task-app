version: 2
updates:
  # セキュリティアップデート（脆弱性チェック）
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'saturday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 5
    labels:
      - 'security'
    # 脆弱性アラートを有効化
    insecure-external-code-execution: deny
    vulnerability-alerts: true
    # 通常の依存関係更新は無効化し、脆弱性対応のみに集中
    versioning-strategy: 'lockfile-only'
    allow:
      # セキュリティ更新のみを許可
      - dependency-type: 'all'
        update-types: ['security']

  # GitHub Actions のセキュリティアップデート
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'saturday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 3
    labels:
      - 'security'
      - 'github-actions'
    vulnerability-alerts: true
    # 通常の更新は無効化し、セキュリティ更新のみに集中
    allow:
      # セキュリティ更新のみを許可
      - dependency-type: 'all'
        update-types: ['security']
