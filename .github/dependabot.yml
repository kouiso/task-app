version: 2
updates:
  # npm パッケージの更新
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "saturday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      # 開発用依存関係のマイナーとパッチ更新は無視
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
        dependency-type: "development"
    groups:
      types:
        patterns:
          - "@types/*"
      linters:
        patterns:
          - "eslint*"
          - "prettier*"
          - "stylelint*"
        
  # GitHub Actions の更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "saturday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions" 