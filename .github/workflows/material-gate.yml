name: Material Quality Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'material/**/*.md'
      - '.claude/skills/material-writing/**'
      - '.gitmodules'
      # ルール側を変えたら corpus 全体を再検査する（ルール変更で既存日が赤くなるのを
      # マージ後ではなくPR時点で気づくため）
      - '.textlintrc.json'
      - 'package.json'
      - 'scripts/curriculum-qa/**'
      - '.github/workflows/material-gate.yml'
      # scaffold 配布物。Gate 3 の check_scaffold_curriculum_alignment.py が
      # SCAFFOLD_COPY_MAP 経由でここを読むため、これらを消す/改名するPRでも
      # 起動しないと「ゲートが捕まえるはずの退行」を取り逃す（Codexレビュー指摘 PR#282）。
      - 'scripts/_lib-base/**'
      - 'scripts/_lib-utils/**'
      - 'scripts/_constants/**'
      - 'scripts/_trpc-base/**'
      - 'scripts/_app-components/**'
      - 'scripts/_ui-components/**'
      - 'scripts/_server-routers/**'
  push:
    branches:
      - develop
      - main
    paths:
      - 'material/**/*.md'
      - '.claude/skills/material-writing/**'
      - '.gitmodules'
      # ルール側を変えたら corpus 全体を再検査する（ルール変更で既存日が赤くなるのを
      # マージ後ではなくPR時点で気づくため）
      - '.textlintrc.json'
      - 'package.json'
      - 'scripts/curriculum-qa/**'
      - '.github/workflows/material-gate.yml'
      # scaffold 配布物。Gate 3 の check_scaffold_curriculum_alignment.py が
      # SCAFFOLD_COPY_MAP 経由でここを読むため、これらを消す/改名するPRでも
      # 起動しないと「ゲートが捕まえるはずの退行」を取り逃す（Codexレビュー指摘 PR#282）。
      - 'scripts/_lib-base/**'
      - 'scripts/_lib-utils/**'
      - 'scripts/_constants/**'
      - 'scripts/_trpc-base/**'
      - 'scripts/_app-components/**'
      - 'scripts/_ui-components/**'
      - 'scripts/_server-routers/**'
  workflow_dispatch:

jobs:
  vendored-skill-integrity:
    name: 執筆スキルvendoring整合性チェック
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: submodule化への退行を検出（hana652/Xamfonos再発防止）
        run: |
          echo "::group::.gitmodules に material-writing 配下のsubmoduleが無いか確認"
          if grep -q '.claude/skills/material-writing/' .gitmodules 2>/dev/null; then
            echo "::error::.gitmodules に .claude/skills/material-writing/ 配下のsubmoduleエントリが検出されました。"
            echo "hana652/Xamfonosはsubmodule未初期化による誤読バグ(2026-07-14)を受けてvendoring(直接埋め込み)に統一済みです。"
            echo "submoduleへ戻さず、ファイルを直接コピーしてください。詳細: .claude/skills/material-writing/references/ATTRIBUTION.md"
            cat .gitmodules
            exit 1
          fi
          echo "OK: .gitmodules に material-writing 配下のsubmoduleは無い"
          echo "::endgroup::"

      - name: vendoredディレクトリが空になっていないか確認
        run: |
          echo "::group::hana652/Xamfonosの中身が実在するか確認"
          fail=0
          for dir in \
            ".claude/skills/material-writing/hana652-tech-writing-pack" \
            ".claude/skills/material-writing/xamfonos-technical-writing-best-practices"; do
            if [ ! -d "$dir" ]; then
              echo "::error::$dir が存在しません"
              fail=1
              continue
            fi
            count=$(find "$dir" -type f | wc -l)
            if [ "$count" -lt 1 ]; then
              echo "::error::$dir が空です(未初期化submoduleと同じ症状)。ファイルが直接コピーされているか確認してください。"
              fail=1
            else
              echo "OK: $dir ($count ファイル)"
            fi
          done
          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          echo "::endgroup::"

  material-gate:
    name: 教材品質ゲート
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 変更ファイルのみの検査は 2026-07-15 に廃止した。
      # 理由: 変更されていないファイルは永久に検査対象外になるため、911件の違反が
      #       2026-06-30〜07-10 の11日間 corpus に滞留し、ebca2f2 が手で掃除するまで
      #       誰にも検出されなかった。これは実在するカバレッジ欠陥である。
      # 注意: これは外部レビューでの指摘(2026-06-30)の原因ではない。ゲート自体が
      #       拒否の当日(97d59f5, 2026-06-30 11:01)に生まれており、彼が読んだ教材は
      #       ゲート不在時に書かれた。因果を混同しないこと。
      # 移行コスト: ゼロ（2026-07-15 時点でフルスキャン 0 violations / 38ファイル）。

      - name: Gate 1 — 文章衛生チェック (textlint) — material/**/*.md 全体
        run: |
          echo "::group::textlint — material 配下の全 .md（変更有無を問わない）"
          # glob はシェルではなく textlint に展開させる（クォート必須）。
          # 旧実装は changed-files の出力を run: へ素のまま展開しており、
          # スペース入りファイル名で壊れ、ブランチ名経由のシェル注入面にもなっていた。
          # 注: この run: 内に GitHub Actions の式デリミタを literal で書くと、
          #     コメント内であっても評価されてワークフロー全体がパースエラーになる。
          npx textlint "material/**/*.md"
          echo "::endgroup::"

      - name: Gate 2 — 品質チェック (check_quality.sh) — dayXX_*.md 全体
        run: |
          echo "::group::check_quality.sh — dayXX_*.md 全件（変更有無を問わない）"
          # check_quality.sh は複数ファイルを一度に受け取れる（`for arg in "$@"`）ので
          # 1ファイルずつ呼ばない。1ファイルずつ呼ぶとサマリーがファイル数だけ出て
          # CIログが冗長になる（CodeRabbitレビュー指摘 PR#282。実測で145行削減）。
          # ファイル名の空白対策として -print0 / xargs -0 を使う。
          find material -type f -name 'day[0-9][0-9]_*.md' -print0 \
            | sort -z \
            | xargs -0 bash scripts/curriculum-qa/check_quality.sh
          echo "::endgroup::"

      - name: Gate 2.5 — スクショmd5重複チェック — screenshots/ 全体
        run: |
          echo "::group::md5 duplicate scan — 同一内容の画像が別名で存在しないか"
          # 由来: PR#285 レビュー。day09-cards.png == day09-complete.png など、
          #       同一画像が別キャプションで使い回され「キャプションと画像の整合」
          #       (voice-spec ルーブリック6) を壊していた。人手のmd5sum確認は
          #       抜けるので、重複が1組でもあれば落とす。
          dups=$(find material/30days-curriculum/screenshots -type f -name '*.png' -print0 \
            | xargs -0 -r md5sum | sort | awk '{if ($1 == prev) {print prevline; print $0} prev=$1; prevline=$0}' | sort -u)
          if [ -n "$dups" ]; then
            echo "重複スクリーンショットを検出:"
            echo "$dups"
            exit 1
          fi
          echo "重複なし"
          echo "::endgroup::"

      # Gate 3: 2026-07-15 配線。それまで書かれていたのに誰からも呼ばれていなかった。
      #
      # 【このゲートが保証すること / しないこと】
      #   保証する : 教材の @/ import が「scaffold配布物」か「day <= N の filepath ブロック」
      #              のいずれかで宣言されている（+ day順序も見る）
      #   保証しない: コンパイル・実行・アプリが動くこと。
      #              「指示通り打てば動く」の保証ではない（外部レビューの指摘事項の一つは未達）。
      #              それを見るのは typescript-docs-verifier の担当。
      #
      # 【柱3 との衝突・次セッションへの申し送り】
      #   柱3（配布ZIPを学習用/解答用に分離）は scaffold のルーターを意図的に空にする。
      #   その時点でこの不変条件は壊れる。柱3のPRが「このゲートの更新または削除」を
      #   自分の責任範囲に含めること。今は緑（EXIT 0 / All @/ imports are covered）。
      - name: Gate 3 — 教材importの解決チェック (順序込み)
        run: |
          echo "::group::check_scaffold_curriculum_alignment.py"
          python3 scripts/curriculum-qa/check_scaffold_curriculum_alignment.py
          echo "::endgroup::"

      # gen_procedure_map.py は「生成器」であってチェッカーではないため配線しない。
      # CI に置くと再生成して破棄するだけの「緑のno-op」になり、
      # 「走った=検査した」と誤読させる。配線するなら必ず差分検出の形にすること:
      #   python3 scripts/curriculum-qa/gen_procedure_map.py \
      #     && git diff --exit-code material/30days-curriculum/_meta/procedure-day-map.json
