name: Unused Packages Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-unused-packages:
    runs-on: ${{ vars.RUNNER_LINUX }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup tools with mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:

          install: true

      - name: Install dependencies
        run: npm ci

      - name: Check unused dependencies
        id: check-unused-deps
        run: |
          # 未使用パッケージを取得（エラーが発生しても続行）
          UNUSED_DEPS=$(npm run check:unused-deps --silent || echo '{"dependencies":{},"devDependencies":{}}')

          # 結果をファイルに保存
          echo "$UNUSED_DEPS" > unused_deps.json

          # デバッグ用に内容を表示
          echo "Unused dependencies JSON:"
          cat unused_deps.json

          # 未使用の依存関係を抽出（jqを使用して直接配列として取得）
          UNUSED_DEPENDENCIES=$(jq -r '.dependencies | keys | join(", ")' unused_deps.json 2>/dev/null || echo "")
          UNUSED_DEV_DEPENDENCIES=$(jq -r '.devDependencies | keys | join(", ")' unused_deps.json 2>/dev/null || echo "")

          # デバッグ用に出力
          echo "Extracted dependencies: $UNUSED_DEPENDENCIES"
          echo "Extracted dev dependencies: $UNUSED_DEV_DEPENDENCIES"

          # 出力用の変数を設定
          if [ -n "$UNUSED_DEPENDENCIES" ] && [ "$UNUSED_DEPENDENCIES" != "" ]; then
            echo "has_unused_deps=true" >> $GITHUB_OUTPUT
            echo "unused_dependencies=$UNUSED_DEPENDENCIES" >> $GITHUB_OUTPUT
          else
            echo "has_unused_deps=false" >> $GITHUB_OUTPUT
            echo "unused_dependencies=none" >> $GITHUB_OUTPUT
          fi

          if [ -n "$UNUSED_DEV_DEPENDENCIES" ] && [ "$UNUSED_DEV_DEPENDENCIES" != "" ]; then
            echo "has_unused_dev_deps=true" >> $GITHUB_OUTPUT
            echo "unused_dev_dependencies=$UNUSED_DEV_DEPENDENCIES" >> $GITHUB_OUTPUT
          else
            echo "has_unused_dev_deps=false" >> $GITHUB_OUTPUT
            echo "unused_dev_dependencies=none" >> $GITHUB_OUTPUT
          fi

          # このステップは常に成功として終了
          exit 0

      - name: Build comment body
        id: build-comment
        if: always()
        env:
          HAS_UNUSED_DEPS: ${{ steps.check-unused-deps.outputs.has_unused_deps }}
          HAS_UNUSED_DEV_DEPS: ${{ steps.check-unused-deps.outputs.has_unused_dev_deps }}
          UNUSED_DEPS: ${{ steps.check-unused-deps.outputs.unused_dependencies }}
          UNUSED_DEV_DEPS: ${{ steps.check-unused-deps.outputs.unused_dev_dependencies }}
        run: |
          # 入力を環境変数経由で受け取ってサニタイズ
          format_section() {
            local title="$1"
            local has_unused="$2"
            local unused="$3"
            echo "### $title"
            echo
            local list=""
            if [ "$has_unused" = "true" ] && [ -n "$unused" ] && [ "$unused" != "none" ]; then
              list=$(echo "$unused" | awk -F',' '{
                for (i = 1; i <= NF; i++) {
                  s = $i
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", s)
                  if (s != "" && s !~ /^[[:digit:]]+$/) print "- `" s "`"
                }
              }')
            fi
            if [ -n "$list" ]; then
              echo "$list"
            else
              echo "${title}は検出されませんでした。"
            fi
            echo
          }

          {
            echo "## 📦 未使用パッケージの検出"
            echo
            format_section "未使用の依存関係" "$HAS_UNUSED_DEPS" "$UNUSED_DEPS"
            format_section "未使用の開発依存関係" "$HAS_UNUSED_DEV_DEPS" "$UNUSED_DEV_DEPS"
            echo "> 注意: これらのパッケージはコード内で直接参照されていないことが検出されました。ただし、間接的に使用されている可能性もあります。不要なパッケージは削除を検討してください。"
          } > unused_packages_comment.md

          echo "--- preview ---"
          cat unused_packages_comment.md

      - name: Post or update PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: unused-packages-check
          number: ${{ github.event.pull_request.number }}
          path: unused_packages_comment.md
