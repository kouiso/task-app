name: Dependency Review
'on': [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: 依存関係レビュー
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, LGPL-2.0-only, LGPL-2.0-or-later, LGPL-3.0-only, LGPL-3.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later, CDDL-1.0, EPL-1.0
          comment-summary-in-pr: always
          warn-only: false
