name: 依存関係レビュー
'on': [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: 依存関係レビュー
    runs-on: ${{ vars.RUNNER_LINUX }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        continue-on-error: true
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, LGPL-2.0-only, LGPL-2.0-or-later, LGPL-3.0-only, LGPL-3.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later, CDDL-1.0, EPL-1.0
          comment-summary-in-pr: always
          warn-only: true
