name: 依存関係レビュー
'on': [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: 依存関係レビュー
    runs-on: ${{ vars.RUNNER_LINUX }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        continue-on-error: true
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, LGPL-2.0-only, LGPL-2.0-or-later, LGPL-3.0-only, LGPL-3.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later, CDDL-1.0, EPL-1.0
          comment-summary-in-pr: always
          warn-only: true
