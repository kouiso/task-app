name: development

on:
  push:
    branches:
      - '**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: echo '${{ toJSON(steps.node_modules_cache_id.outputs) }}'
      - if: ${{ steps.node_modules_cache_id.outputs.cache-hit != 'true' }}
        run: yarn install
      - run: yarn list --depth=0

      - name: Run Lint And Prettier
        run: yarn fix

      - name: Build Next.js For SSR & SSG And typedoc & storybook
        run: yarn build

      - name: chromatic deploy
        run: yarn chromatic --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
