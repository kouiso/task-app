name: Auto Merge PR

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] fork対応に書き込み権限が必要で、PRのコードは実行しない。
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  check_suite:
    types:
      - completed
  status:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.check_suite.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ${{ vars.RUNNER_LINUX }}
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'check_suite' || github.event.check_suite.conclusion == 'success') &&
      (github.event_name != 'status' || github.event.state == 'success')
    steps:
      - name: Auto Merge PR
        uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67 # v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: 'automerge,!work in progress,!do not merge'
          MERGE_METHOD: 'squash'
          MERGE_COMMIT_MESSAGE: 'pull-request-title'
          MERGE_FORKS: 'true'
          MERGE_RETRIES: '6'
          MERGE_RETRY_SLEEP: '10000'
          MERGE_REQUIRED_APPROVALS: '1'
          MERGE_REQUIRE_CHECKS: 'true'
          UPDATE_LABELS: 'automerge'
          UPDATE_METHOD: 'rebase'
