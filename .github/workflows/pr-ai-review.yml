on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run pr agent on every pull request, respond to user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: Codium-ai/pr-agent@91bf3c0749c39ffb0e0bcba47f42102eeca45cdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI_API_TYPE: "azure"
          OPENAI_API_VERSION: "gpt4o"
          OPENAI.API_BASE: "https://ritmo-gpt.openai.azure.com"
          OPENAI.DEPLOYMENT_ID: "ritmo-assistant"
          PR_DESCRIPTION.EXTRA_INSTRUCTIONS: "answer in Japanese"
          PR_REVIEWER.EXTRA_INSTRUCTIONS: "answer in Japanese"
          PR_CODE_SUGGESTIONS.EXTRA_INSTRUCTIONS: "answer in Japanese"
