name: Java CI with Maven

on:
  push:
    branches: [development]

jobs:
  remove-old-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Remove old artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '5d'
          # Optional inputs
          # skip-tags: true
          # skip-recent: 5

  build:
    runs-on: ubuntu-latest
