name: 'Common Setup'
on:
  workflow_call:
    secrets:
      firebase-api-key:
        description: 'Firebase API Key'
        required: true
      firebase-auth-domain:
        description: 'Firebase Auth Domain'
        required: true
      firebase-project-id:
        description: 'Firebase Project ID'
        required: true
      firebase-storage-bucket:
        description: 'Firebase Storage Bucket'
        required: true
      firebase-messaging-sender-id:
        description: 'Firebase Messaging Sender ID'
        required: true
      firebase-app-id:
        description: 'Firebase App ID'
        required: true
      firebase-measurement-id:
        description: 'Firebase Measurement ID'
        required: true

jobs:
  setup:
    # Runner is configured via the RUNNER_LINUX repository variable.
    # Set to 'ubuntu-latest' (GitHub-hosted) for reliability.
    # Blacksmith runners (blacksmith-*vcpu-ubuntu-*) were queuing indefinitely
    # from 2026-05-21 onwards; tracked in issue #177.
    runs-on: ${{ vars.RUNNER_LINUX }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: taskapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup tools with mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install: true

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cache-node
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Set Firebase Environment Variables
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.firebase-api-key }}" >> .env
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.firebase-auth-domain }}" >> .env
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.firebase-project-id }}" >> .env
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.firebase-storage-bucket }}" >> .env
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.firebase-messaging-sender-id }}" >> .env
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.firebase-app-id }}" >> .env
          echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.firebase-measurement-id }}" >> .env
          echo "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy" >> .env
          echo "TEST_DATABASE_URL=postgresql://user:password@localhost:5432/taskapp_test?schema=public" >> .env
          echo "_DOCKER_COMPOSE_HOST_PORT_TEST_DB=5432" >> .env
          echo "JWT_SECRET=dummy-jwt-secret-for-ci-32-chars-min" >> .env
          echo "SKIP_ENV_VALIDATION=true" >> .env

      - name: Npm Build
        run: npm run build:ci

      - name: Npm Lint
        run: npm run lint

      - name: Npm Type Check
        run: npm run type-check

      - name: Npm Test
        run: npm test
