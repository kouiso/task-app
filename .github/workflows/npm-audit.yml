name: npm audit

on:
  push:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 9 * * 1' # 毎週月曜 9:00 UTC

permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ${{ vars.RUNNER_LINUX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools with mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
