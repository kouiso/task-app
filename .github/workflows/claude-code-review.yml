name: Claude コードレビュー

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    # 保護ブランチ（main, develop）へのPRのみレビュー
    # シークレットが設定されていない場合はスキップ
    if: |
      (github.event.pull_request.base.ref == 'main' ||
      github.event.pull_request.base.ref == 'develop') &&
      vars.CLAUDE_CODE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude コードレビューを実行
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          direct_prompt: |
            Before reviewing, read CLAUDE.md and .claude/skills/**/*.md if they exist.

            Review this PR with strict adherence to these critical rules:

            ## Type Safety (STRICT - Violations are immediate failures)
            - NO `any` type usage (`as any`, `any[]`, `: any`)
            - NO type assertions (`as SomeType`) except `as const`
            - MUST use type utilities: `Omit`, `Pick`, `Partial`, `Required`, `Record`
            - NO eslint-disable comments

            ## Code Quality
            - All comments MUST be in Japanese (no English comments)
            - Comments must explain "Why", not "What"
            - NO backup files (.bak, .backup, .old, _temp, _copy)
            - NO unused variables (don't use underscore prefix as workaround)
            - NO `export { A as B }` - use pure named exports

            ## Review Focus
            - Potential bugs and edge cases
            - Performance issues
            - Security vulnerabilities
            - Test coverage gaps
            - Adherence to existing code patterns and architecture

            Be specific and actionable in your feedback.

            **IMPORTANT: All review comments MUST be written in Japanese.**
