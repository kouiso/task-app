name: Performance

on:
  pull_request:
    branches:
      - main

jobs:
  bundle-and-lighthouse:
    name: Bundle analysis and Lighthouse CI
    runs-on: ${{ vars.RUNNER_LINUX }}
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/taskapp?schema=public
      JWT_SECRET: perf-ci-jwt-secret-32-chars-minimum
      SKIP_ENV_VALIDATION: 'true'
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build with bundle analyzer
        run: ANALYZE=true npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
