name: Performance

on:
  pull_request:
    branches:
      - main

jobs:
  bundle-and-lighthouse:
    name: Bundle analysis and Lighthouse CI
    runs-on: ${{ vars.RUNNER_LINUX }}
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/taskapp?schema=public
      JWT_SECRET: perf-ci-jwt-secret-32-chars-minimum
      SKIP_ENV_VALIDATION: 'true'
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build with bundle analyzer
        run: ANALYZE=true npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
