name: License Check
on:
  workflow_call:
    inputs:
      disallow-licenses:
        required: false
        type: string
        description: 'Semicolon-separated list of disallowed licenses'
        default: 'GPL;GPL-2.0;GPL-3.0;LGPL;LGPL-3.0;AGPL-3.0;SSPL;EUPL;CDDL-1.0;EPL-1.0;OPL-1.0'

jobs:
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup tools with mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Check if package files have changed
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PRイベントの場合、ベースブランチと比較
            git fetch origin ${{ github.event.pull_request.base.ref }}
            CHANGED_FILES=$(git diff --name-only FETCH_HEAD..${{ github.sha }} | grep -E 'package(-lock)?\.json$' || true)
          else
            # Push/workflow_dispatchイベントの場合、1つ前のコミットと比較
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep -E 'package(-lock)?\.json$' || true)
          fi

          if [[ -n "$CHANGED_FILES" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "変更が検出されたpackageファイル: $CHANGED_FILES"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "packageファイルの変更はありません"
          fi

      - name: Install dependencies
        if: steps.check_changes.outputs.changes == 'true'
        run: npm ci

      - name: Check licenses
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          npm install -g license-checker

          DISALLOWED_LICENSES="${{ inputs.disallow-licenses }}"
          IFS=';' read -ra LICENSES <<< "$DISALLOWED_LICENSES"

          DISALLOW_ARGS=""
          for license in "${LICENSES[@]}"; do
            DISALLOW_ARGS+="--failOn \"$license\" "
          done

          echo "Checking for disallowed licenses: $DISALLOWED_LICENSES"
          eval "license-checker --production --json $DISALLOW_ARGS"

          echo "No disallowed licenses found. License check passed."
