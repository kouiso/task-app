apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: horsemanager-web
  namespace: '854948159230'
  annotations:
    run.googleapis.com/ingress: all
  labels:
    cloud.googleapis.com/location: asia-northeast1
    managed-by: github-actions
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '100'
        run.googleapis.com/startup-cpu-boost: 'true'
      labels:
        managed-by: github-actions
        run.googleapis.com/startupProbeType: Default
    spec:
      containerConcurrency: 80
      containers:
      - image: asia.gcr.io/horsemanager-2d136/horsemanager-web/app:latest
        ports:
        - containerPort: 8080
          name: http1
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        startupProbe:
          failureThreshold: 1
          periodSeconds: 240
          tcpSocket:
            port: 8080
          timeoutSeconds: 240
      serviceAccountName: compute-service-account@horsemanager-2d136.iam.gserviceaccount.com
      timeoutSeconds: 300
  traffic:
  - latestRevision: true
    percent: 100
