version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install
        - yarn fix
    build:
      commands:
        - yarn build
    postbuild:
      commands:
        - yarn chromatic --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
  artifacts:
    baseDirectory: /
    files:
      - '.next/**/*'
  cache:
    paths:
      - node_modules/**/*
