# https://taskfile.dev

version: '3'

dotenv:
  - .env

tasks:
  default:
    cmds:
      - task -l

  # ----- 初期化関連コマンド
  init:
    desc: "環境初期化(何度でも実行可能 - 環境を壊してしまった場合、本コマンドの再実行で修復可能)"
    cmds:
      # 依存のインストール
      - cmd: brew install jq
        platforms: [linux, darwin]
      - cmd: scoop install jq
        platforms: [windows]
      # playground.nnbの作成
      - task: write-playground
        platforms: [linux, darwin]
      - task: write-playground-windows
        platforms: [windows]
      # クリーン
      - task: clean
      # 環境をdbボリューム含め消去
      - docker compose down -v --remove-orphans
      - docker compose --profile schemaspy down -v --remove-orphans
      # seed可能になるまで時間がかかるのでdbを先にwarmup
      - docker compose up -d db
      # コンテナイメージ構築
      - docker compose build
      # ローカルnode_modulesの作成(VSCode用) - バージョン管理ツールが自動的に正しいバージョンを使用
      - npm ci
      # seed
      - echo waiting for db to be ready...
      - cmd: sleep 40
        platforms: [linux, darwin]
      - cmd: timeout /t 40
        platforms: [windows]
      - task: seed

  seed:
    desc: "DBリセット・シードデータ投入"
    cmds:
      # 最大3回までリトライ（無限ループ防止）
      - cmd: |
          for i in 1 2 3; do
            if docker compose run --rm backend npx prisma migrate reset --skip-seed --force; then
              break
            fi
            if [ $i -lt 3 ]; then
              echo "Command failed (attempt $i/3), retrying in 10 seconds..."
              sleep 10
            else
              echo "Command failed after 3 attempts"
              exit 1
            fi
          done
        platforms: [linux, darwin]
      - cmd: |
          set attempts=0
          :retry
          set /a attempts+=1
          docker compose run --rm backend npx prisma migrate reset --skip-seed --force
          if errorlevel 1 (
            if %attempts% lss 3 (
              echo Command failed (attempt %attempts%/3), retrying in 10 seconds...
              timeout /t 10
              goto retry
            ) else (
              echo Command failed after 3 attempts
              exit /b 1
            )
          )
        platforms: [windows]
      - task: db-apply
      - docker compose run --rm -e EMAIL_SILENT=true backend npx prisma db seed

  clean:
    desc: "自動生成されたファイル・フォルダを削除"
    cmds:
      - cmd: rm -rf dist node_modules prisma/client doc/definition
        platforms: [linux, darwin]
      - cmd: if exist dist rd /s /q dist
        platforms: [windows]
      - cmd: if exist node_modules rd /s /q node_modules
        platforms: [windows]
      - cmd: if exist prisma\client rd /s /q prisma\client
        platforms: [windows]
      - cmd: if exist doc\definition rd /s /q doc\definition
        platforms: [windows]

  # ----- 起動コマンド

  up-backend:
    desc: "バックエンドサーバーを起動"
    cmds:
      - task: db-apply
      - docker compose up --build backend

  # ----- DB関連コマンド

  db-apply:
    desc: "prismaスキーマからコード生成&状態をDBに反映: 開発効率重視のため、本番環境への初回リリースまではこちらのコマンドのみを使用する"
    cmds:
      - docker compose run --rm backend npx prisma db push

  #
  # db-migrate-gen:
  #   desc: "prismaスキーマからマイグレーションを作成&反映"
  #   cmds:
  #     - npx prisma generate
  #     - npx prisma migrate dev --name init

  # ----- 生成系コマンド

  gen-db-schema:
    desc: "schemaspyでDBスキーマを生成"
    cmds:
      - docker compose up schemaspy


  # ----- util系コマンド
  npmi:
    desc: "npm ciコマンドをコンテナで実行"
    cmds:
      - docker compose run --rm backend npm ci


  # ----- 内部呼び出しコマンド (ユーザーが直叩かない)

  write-playground:
    desc: "(内部用) playground.nnbファイルを作成する"
    internal: true
    platforms: [linux, darwin]
    cmds:
      - |
        FILE="playground.nnb"
        if [ ! -f "$FILE" ]; then
            cat << EOF > "$FILE"
        {"cells": [{"language": "typescript", "source": ["console.log(JSON.stringify({}))"], "outputs": [{"items": [{"mime": "application/vnd.code.notebook.stdout", "value": ["{}", ""]}]}]}]}
        EOF
        fi

  write-playground-windows:
    desc: "(内部用) playground.nnbファイルを作成する (Windows)"
    internal: true
    platforms: [windows]
    cmds:
      - |
        if not exist playground.nnb (
          echo {"cells": [{"language": "typescript", "source": ["console.log(JSON.stringify({}))"], "outputs": [{"items": [{"mime": "application/vnd.code.notebook.stdout", "value": ["{}", ""]}]}]}]} > playground.nnb
        )

