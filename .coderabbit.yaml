# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json

language: "ja-JP"

reviews:
  profile: "assertive"
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
  tools:
    biome:
      enabled: true  # any/as/typeof等の静的パターンは Biome に委譲
    gitleaks:
      enabled: false
    semgrep:
      enabled: false
  path_instructions:
    # ──────────────────────────────────────────────────────────────────────────
    # TS/TSX: 意味的・設計的観点（静的チェックは Biome に委譲、重複させない）
    # ──────────────────────────────────────────────────────────────────────────
    - path: "**/*.{ts,tsx}"
      instructions: |
        以下の **意味的・設計的ミスパターン** を優先して確認してください。
        Biome がカバーする静的パターン（any/as/typeof の列挙）は除外します。

        ### [MUST] #1 スコープクリープ（ついで改善の混入）
        バグ修正・Issue 対応 PR に、修正に不要なリファクタ・整理・無関係な変更が混入していないか確認。
        例: バグ fix PR に「ついでに型定義を整理」「ついでにルーターを整理」が入っている → [MUST] 指摘。

        ### [MUST] #3 影響範囲漏れ（兄弟ファイル未修正）
        1 ファイルだけ変更されていて、同じパターンの類似ファイル（他の page.tsx / router / 設定ファイル）が
        未更新のまま放置されていないか確認してください。

        ### [MUST] #5 setTimeout レースハック
        `setTimeout` をアニメーション・モーダル・トランジション完了待ちとして使用していないか確認。
        正しい代替: `onTransitionEnd` / `onAnimationEnd` / コールバック。
        例: `setTimeout(() => setIsOpen(false), 300)` → [MUST] 指摘。

        ### [MUST] #6 既存状態初期化の削除（デグレ再発）
        UX 改善・「ちらつき防止」の名目で、バグ修正として導入された state リセット処理
        （`setState([])` 等）が削除されていないか確認してください。削除するとデグレが再発します。

        ### [MUST] #8 useEffect / useLayoutEffect の誤用
        - 依存配列が欠落・過剰でないか
        - DOM 測定以外の目的で `useLayoutEffect` が使われていないか
        - 本来コールバックで済む処理が effect に入っていないか

        ### [SUGGEST] #9 エラー握りつぶし
        空の `catch {}` / `catch { console.log(e) }` のみ / `|| true` でエラーを隠蔽していないか確認。

        ### 設計 lean ガードレール（Biome 非検出の観点のみ）
        - Props 型は `ComponentNameProps` 形式で命名すること（`type Props = {}` は [MUST] 指摘）
        - Prisma クライアントのインポートは `@prismaClient` エイリアスを使用すること
        - Prisma 生成型を積極活用し、独自型の再定義を最小化すること
        - 境界値（API レスポンス・フォーム入力）では Zod でバリデーションすること

    # ──────────────────────────────────────────────────────────────────────────
    # tRPC ルーター: 認証認可 + N+1
    # ──────────────────────────────────────────────────────────────────────────
    - path: "src/server/**/*.ts"
      instructions: |
        ### [MUST] #4 認証・認可チェックの欠落
        tRPC procedure に `ctx.session` / `getServerSession` による認証チェックが無い場合は [MUST] 指摘。
        保護リソースへのアクセスが認証なしで通る実装を必ず探してください。

        ### [MUST] #7 N+1 / ループ内 DB アクセス
        `for` / `map` / `forEach` の中で都度 `prisma.*.findUnique` / `prisma.*.findFirst` が呼ばれていないか確認。
        正しい代替: `prisma.*.findMany({ where: { id: { in: ids } } })` でバッチ取得 / `include` で一括取得。

    # ──────────────────────────────────────────────────────────────────────────
    # Route Handler: 認証認可 + N+1
    # ──────────────────────────────────────────────────────────────────────────
    - path: "src/app/**/route.ts"
      instructions: |
        ### [MUST] #4 Route Handler の認証チェック
        POST / PUT / DELETE / PATCH エンドポイントに `getServerSession` / `auth()` がないなら [MUST] 指摘。

        ### [MUST] #7 N+1 / ループ内 DB アクセス
        ループ内での個別 Prisma クエリを確認してください。

    # ──────────────────────────────────────────────────────────────────────────
    # テスト: テスト品質
    # ──────────────────────────────────────────────────────────────────────────
    - path: "**/*.{test,spec}.{ts,tsx}"
      instructions: |
        ### [SUGGEST] #10 テスト品質
        - 振る舞い変更（新機能・バグ修正）にテストが追加されていない場合は [SUGGEST] で指摘
        - アサーションを緩めたり削除してグリーンにしていないか確認
        - 正常系のみで異常系・エッジケース（空配列・null・境界値）が未テストなら [SUGGEST] で指摘

    # ──────────────────────────────────────────────────────────────────────────
    # Prisma スキーマ
    # ──────────────────────────────────────────────────────────────────────────
    - path: "**/*.prisma"
      instructions: |
        Prismaスキーマ規約を確認してください：
        1. モデル名は PascalCase、フィールド名は camelCase で命名すること
        2. 検索・結合に使うフィールドには `@@index` を付与すること
        3. 一意性が必要なフィールドには `@@unique` を付与すること
        4. リレーションには `onDelete` / `onUpdate` を明示すること（暗黙のデフォルト禁止）
        5. NULL 許容フィールドの意図を明確にし、不要な `?` を避けること

    # ──────────────────────────────────────────────────────────────────────────
    # 教材（30日カリキュラム）: 文章品質・AI臭・偏愛語
    # ──────────────────────────────────────────────────────────────────────────
    - path: "material/**/*.md"
      instructions: |
        AGENTS.md の「教材（material/**/*.md）の文章品質規約」を参照して確認してください。

        ### [MUST] 5つの不在（AIっぽい文章の思考的欠落）
        - 態度の不在: 全トピックが同じ温度で書かれていないか（重要な所とそうでない所の緩急）
        - 勇気の不在: 「〜と言えるでしょう」「〜かもしれません」で言い切りを避けていないか
        - リズムの不在: 文の長さが均一で緩急が無いか
        - 沈黙の不在: すべての段落が結論で閉じられ、考える余地が無いか
        ただし省略の不在は教材では逆方向（手順の省略は禁止）なので、
        「同様に」「残りも」「以下略」による手順省略のみ [MUST] 指摘してください。

        ### [SUGGEST] 偏愛語（実体のない抽象語）
        「落ちる・壊れる・刺さる・効く」「設計・仕組み・構造・本質・流れ・全体像」等が
        実体を示さず登場していないか確認してください（名詞の指示対象を1文で説明できるか）。

        ### [MUST] 教材固有チェック
        - コードブロックが26行以上（分割・省略推奨）
        - 新出の専門用語に初出時の注釈（括弧書き）が無い
        - コード提示の前に「その手続きが解く問題」を示さず、いきなりコードから入っている（なぜを教えていない）

    # ──────────────────────────────────────────────────────────────────────────
    # PR 全体: 架空完了 + 影響範囲（言語非依存 catch-all）
    # ──────────────────────────────────────────────────────────────────────────
    - path: "**"
      instructions: |
        ### [MUST] #2 架空完了 / 動作未確認の示唆
        PR 説明・コミットメッセージに「動くはず」「確認してください」「動作確認済み（根拠なし）」等の
        記述がある場合は [MUST] で指摘してください。

        ### [Q] #3 影響範囲の PR 説明漏れ
        変更したファイルと同じパターンの類似ファイルが存在するにもかかわらず、
        PR 説明に変更範囲の説明が無い場合は [Q] で確認してください。

chat:
  auto_reply: true
