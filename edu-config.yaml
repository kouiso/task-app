# edu-config.yaml for task-app
# 教材生成ツールの設定ファイル

# 安全設定
safety:
  max_iterations: 3
  max_retries: 3
  max_rpm: 10
  timeout_seconds: 1800
  cost_confirmation_threshold_usd: 1.0

# 除外設定
exclusions:
  directories:
    - node_modules
    - .next
    - dist
    - build
    - coverage
    - .git
    - .vercel
    - playwright-report
    - test-results
    - .idea
    - __pycache__
    - .pnp
    - out
    - edu-creator
    - e2e
    - prompt
  patterns:
    - "*.log"
    - "*.env*"
    - "*.db"
    - "*.db-*"
    - "*.local"
    - "*.pem"
    - "*.py"
    - "*.txt"

# LLM設定（.envから読み込み、ここで上書き可能）
llm:
  commander_model: "gpt-5.2"
  worker_model: "gemini-2.0-flash"
  commander_temperature: 0.2
  worker_temperature: 0.4

# =============================================================================
# 教育メソッド（AI自由発想 + ガイドライン）
# =============================================================================
teaching:
  philosophy: |
    YOU decide the best metaphor for each concept.
    Guidelines are suggestions, not rules.
    Prioritize: clarity > consistency > guidelines

  guidelines:
    - "日常生活で誰でも知っているものに例える（料理、学校、ゲームなど）"
    - "1つの概念に1つの比喩（混ぜると混乱する）"
    - "読者が「なるほど！」と思える身近な例を選ぶ"
    - "専門用語を使う場合は必ず直後に（）で日本語説明を入れる"
    - "略語は初出時にフルスペル＋日本語説明を必須とする"

  # 専門用語ルール
  terminology_rules:
    - "初出の専門用語は必ず「用語（読み方・日本語での意味）」形式で説明"
    - "例: API（エーピーアイ：アプリ同士が会話するための窓口）"
    - "例: Docker（ドッカー：アプリを箱詰めして持ち運べるようにするツール）"
    - "例: npm（エヌピーエム：Node.jsのパッケージ管理ツール）"
    - "2回目以降は説明なしでOK"

# =============================================================================
# 品質ルール（CURRICULUM_PLAN.md準拠）
# =============================================================================
quality_rules:
  max_code_lines: 25
  max_paragraph_sentences: 3
  require_filepath: true
  require_verification: true
  require_metaphor: true
  forbidden_words:
    - "同様に"
    - "残りも"
    - "以下略"
    - "簡単です"
    - "同じように"
  min_tables_per_day: 4
  min_screenshots: 3

# スクリーンショット撮影設定（必要に応じて有効化）
screenshots:
  enabled: false
  output_dir: material/screenshot
  app_startup:
    command: "npm run dev"
    port: 3000
    wait_time_seconds: 20
    ready_pattern: ""
  headless: true
  captures: []

# パス設定
paths:
  src_dir: "src"
  output_dir: "material/30days-curriculum"

# 30日間カリキュラム
chapters:
  # Week 1: 最初の一歩を踏み出そう
  - id: "day01"
    title: "開発環境を整えて、初めてのアプリを動かそう"
    subtitle: "〜プログラミングの「キッチン」を準備する〜"
    what_you_will_make: "Docker環境でNext.jsアプリを起動して、ブラウザで表示"
    what_you_will_learn: "Docker、Node.js、npm、VS Code、ターミナルの基本"
    topics: ["環境構築", "Docker", "docker-compose", "Node.js", "npm", "VS Code"]

  - id: "day02"
    title: "データに名札をつけて管理しよう"
    subtitle: "〜お弁当箱に「サンドイッチ」と書くように〜"
    what_you_will_make: "ユーザー名や年齢を保存できる変数を作る"
    what_you_will_learn: "TypeScriptの変数と型の基本"
    topics: ["変数", "型", "const/let", "基本的な型"]

  - id: "day03"
    title: "再利用できるUI部品を作ろう"
    subtitle: "〜ボタンやカードを1回作れば何度でも使える〜"
    what_you_will_make: "自分専用のボタンコンポーネント、カードコンポーネント"
    what_you_will_learn: "Reactコンポーネントの作り方と再利用方法"
    topics: ["Reactコンポーネント", "JSX", "props", "children"]

  - id: "day04"
    title: "ボタンを押したら数字が増えるカウンターを作ろう"
    subtitle: "〜ゲームのスコアみたいに状態を保存する〜"
    what_you_will_make: "クリックするたびに数字が増えるカウンターアプリ"
    what_you_will_learn: "状態管理の基本（useState）とイベント処理"
    topics: ["useState", "state", "イベントハンドラ"]

  - id: "day05"
    title: "ページが開いたら自動で動く仕組みを作ろう"
    subtitle: "〜タイマーや自動通知の基礎〜"
    what_you_will_make: "ページを開くと自動で時刻を表示する時計アプリ"
    what_you_will_learn: "副作用（useEffect）と便利なHooks"
    topics: ["useEffect", "useCallback", "useMemo", "カスタムHooks"]

  # Week 2: データを保存して、取り出せるようにしよう
  - id: "day06"
    title: "データベースにユーザー情報を保存しよう"
    subtitle: "〜アプリを閉じても消えないデータ保管庫を作る〜"
    what_you_will_make: "ユーザー情報を保存・取得できるデータベース"
    what_you_will_learn: "Prismaを使ったデータベース操作の基本"
    topics: ["Prisma", "スキーマ", "モデル", "データベース"]

  - id: "day07"
    title: "ボタンを押したらデータが取れる仕組みを作ろう"
    subtitle: "〜フロントエンドとバックエンドをつなぐ〜"
    what_you_will_make: "データを取得・作成・更新・削除できるAPI"
    what_you_will_learn: "tRPCを使った型安全なAPI設計"
    topics: ["tRPC", "API", "ルーター", "プロシージャ"]

  - id: "day08"
    title: "ログイン機能を作ろう"
    subtitle: "〜自分だけがアクセスできるページを作る〜"
    what_you_will_make: "メールとパスワードでログインできる認証システム"
    what_you_will_learn: "NextAuthを使った認証の実装"
    topics: ["NextAuth", "認証", "セッション", "ログイン"]

  - id: "day09"
    title: "入力ミスを防ぐフォームを作ろう"
    subtitle: "〜空欄や不正な入力をチェックする門番〜"
    what_you_will_make: "バリデーション付きのユーザー登録フォーム"
    what_you_will_learn: "react-hook-formとzodを使ったフォーム管理"
    topics: ["フォーム", "バリデーション", "エラーハンドリング"]

  - id: "day10"
    title: "アプリを綺麗にデザインしよう"
    subtitle: "〜スマホでもPCでも見やすいデザインに〜"
    what_you_will_make: "Tailwind CSSで装飾した美しいUIコンポーネント"
    what_you_will_learn: "Tailwind CSSとshadcn/uiを使ったスタイリング"
    topics: ["Tailwind CSS", "shadcn/ui", "レスポンシブ", "ダークモード"]

  # Week 3: 実用的なTODOアプリを作ろう
  - id: "day11"
    title: "TODOを追加・編集・削除できるようにしよう"
    subtitle: "〜自分専用のタスク管理アプリを作る〜"
    what_you_will_make: "タスクの作成・編集・削除・完了ができるTODOアプリ"
    what_you_will_learn: "CRUDの基本（データの作成・読取・更新・削除）"
    topics: ["CRUD", "タスク管理", "データ操作"]

  - id: "day12"
    title: "プロジェクトでタスクを分類しよう"
    subtitle: "〜仕事用・プライベート用でタスクを分ける〜"
    what_you_will_make: "プロジェクト別にタスクを整理できる機能"
    what_you_will_learn: "データのグループ化とフィルタリング"
    topics: ["プロジェクト管理", "グループ化", "フィルタリング"]

  - id: "day13"
    title: "キーワードでタスクを検索できるようにしよう"
    subtitle: "〜大量のタスクから目的のものをすぐ見つける〜"
    what_you_will_make: "タスクを検索・並び替えできる検索機能"
    what_you_will_learn: "全文検索とソート機能の実装"
    topics: ["検索", "フィルター", "ソート"]

  - id: "day14"
    title: "進捗状況を一目で分かるダッシュボードを作ろう"
    subtitle: "〜完了率や未完了タスク数をグラフで表示〜"
    what_you_will_make: "タスクの統計情報を表示するダッシュボード"
    what_you_will_learn: "データ集計とグラフ表示（Recharts）"
    topics: ["ダッシュボード", "データ集計", "グラフ表示"]

  - id: "day15"
    title: "週次レポートを自動生成しよう"
    subtitle: "〜今週何をやったか自動でまとめる〜"
    what_you_will_make: "週ごとのタスク完了状況レポート"
    what_you_will_learn: "データの集計と期間フィルタリング"
    topics: ["レポート", "週次集計", "統計"]

  # Week 4: アプリをもっと便利にしよう
  - id: "day16"
    title: "作業時間を計測できるタイマーを作ろう"
    subtitle: "〜どのタスクに何時間使ったか記録する〜"
    what_you_will_make: "開始・停止ボタンで作業時間を記録できるタイマー機能"
    what_you_will_learn: "時間計測とログ記録の実装"
    topics: ["タイマー", "時間計測", "作業ログ"]

  - id: "day17"
    title: "チームメンバーを管理できるようにしよう"
    subtitle: "〜複数人でタスクを共有する〜"
    what_you_will_make: "ユーザーの追加・編集・権限管理ができる機能"
    what_you_will_learn: "ユーザー管理とロール制御"
    topics: ["ユーザー管理", "権限管理", "プロフィール編集"]

  - id: "day18"
    title: "使いやすいメニューとナビゲーションを作ろう"
    subtitle: "〜どのページにもすぐ移動できるように〜"
    what_you_will_make: "サイドバーメニューとページ遷移"
    what_you_will_learn: "Next.js App Routerのレイアウトとナビゲーション"
    topics: ["レイアウト", "ナビゲーション", "メニュー"]

  - id: "day19"
    title: "よく使うロジックを再利用できるようにしよう"
    subtitle: "〜自分だけの便利な道具箱を作る〜"
    what_you_will_make: "フォーム管理やAPI呼び出しを簡単にするカスタムHooks"
    what_you_will_learn: "カスタムHooksの作り方と再利用方法"
    topics: ["カスタムHooks", "ロジックの抽象化", "コード再利用"]

  - id: "day20"
    title: "エラーが起きても壊れないアプリにしよう"
    subtitle: "〜問題が起きたらユーザーに優しく伝える〜"
    what_you_will_make: "エラー発生時に適切なメッセージを表示する仕組み"
    what_you_will_learn: "エラーハンドリングとユーザー通知"
    topics: ["エラー処理", "try-catch", "トースト通知"]

  # Week 5: 作ったアプリを世界中に公開しよう！
  - id: "day21"
    title: "作ったアプリを世界中に公開しよう"
    subtitle: "〜URLで誰でもアクセスできるように〜"
    what_you_will_make: "Vercelで公開された本番環境のアプリ"
    what_you_will_learn: "Vercelへのデプロイとドメイン設定"
    topics: ["Vercel", "デプロイ", "本番環境", "公開"]

  - id: "day22"
    title: "パスワードやAPIキーを安全に管理しよう"
    subtitle: "〜秘密情報をGitHubに載せない〜"
    what_you_will_make: "環境変数を使った安全な設定管理"
    what_you_will_learn: ".envファイルと環境変数の使い方"
    topics: ["環境変数", ".env", "セキュリティ"]

  - id: "day23"
    title: "独自ドメインを設定してプロっぽくしよう"
    subtitle: "〜your-app.vercel.app → your-app.com に〜"
    what_you_will_make: "独自ドメインで公開されたアプリ"
    what_you_will_learn: "ドメインの取得と設定方法"
    topics: ["独自ドメイン", "DNS設定", "本番運用"]

  - id: "day24"
    title: "タスクにコメント機能を追加しよう"
    subtitle: "〜メモや進捗報告を記録できるように〜"
    what_you_will_make: "タスクにコメントを投稿・編集・削除できる機能"
    what_you_will_learn: "コメントシステムの実装"
    topics: ["コメント機能", "リアルタイム更新", "CRUD"]

  - id: "day25"
    title: "30日間の学びを振り返ろう"
    subtitle: "〜次のステップへ進むために〜"
    what_you_will_make: "学んだことの総まとめと今後の学習計画"
    what_you_will_learn: "ベストプラクティスと継続学習のコツ"
    topics: ["振り返り", "ポートフォリオ", "次のステップ"]

