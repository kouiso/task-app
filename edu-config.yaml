# edu-config.yaml for task-app
# 教材生成ツールの設定ファイル

# 安全設定
safety:
  max_iterations: 3
  max_retries: 3
  max_rpm: 5  # クォータ枯渇防止のため低めに設定
  timeout_seconds: 1800
  cost_confirmation_threshold_usd: 1.0
  # フォールバック設定: Geminiがエラーの場合GPTにフォールバック
  fallback_enabled: true
  fallback_model: "gpt-5.2"

# 除外設定
exclusions:
  directories:
    - node_modules
    - .next
    - dist
    - build
    - coverage
    - .git
    - .vercel
    - playwright-report
    - test-results
    - .idea
    - __pycache__
    - .pnp
    - out
    - edu-creator
    - e2e
    - prompt
  patterns:
    - "*.log"
    - "*.env*"
    - "*.db"
    - "*.db-*"
    - "*.local"
    - "*.pem"
    - "*.py"
    - "*.txt"

# Claude Code CLI設定（main_pm.py パイプライン用 — API課金ゼロ）
claude_code:
  lead_model: "claude-opus-4-6"
  worker_model: "claude-sonnet-4-6"

# レビュー層バックエンド設定（異ファミリーアンサンブル — PO=ChatGPT）
reviewer:
  technical_backend: "claude_code"
  ux_backend: "claude_code"
  po_backend: "chatgpt"
  po_model: "gpt-5.4"

# LLM設定（.envから読み込み、ここで上書き可能）
llm:
  commander_model: "gpt-5.2"
  worker_model: "gpt-5.2"  # Geminiクォータ枯渇のため全てGPT-5.2に統一
  commander_temperature: 0.2
  worker_temperature: 0.4

  # エージェント個別設定（全てGPT-5.2に統一 - Geminiクォータ枯渇対策）
  agent_models:
    # ==========================================================================
    # PM層（レビューAI）
    # ==========================================================================
    product_owner:
      model: "gpt-5.2"  # 最終承認 - 文章品質重視
      temperature: 0.2
    content_pm:
      model: "gpt-5.2"  # 構造・フロー検証 - 文章品質重視
      temperature: 0.2
    quality_pm:
      model: "gpt-5.2"  # コード品質・正確性検証
      temperature: 0.3
    beginner_advocate:
      model: "gpt-5.2"  # 初心者視点検証 - 文章分かりやすさ重視
      temperature: 0.3

    # ==========================================================================
    # Worker層（作業AI）
    # ==========================================================================
    scout:
      model: "gpt-5.2"  # リサーチ
      temperature: 0.4
    scribe:
      model: "gpt-5.2"  # 執筆 - 大量テキスト生成
      temperature: 0.4
    validator:
      model: "gpt-5.2"  # コマンド・コード検証 - 正確性重視
      temperature: 0.3

# =============================================================================
# 教育メソッド（AI自由発想 + ガイドライン）
# =============================================================================
teaching:
  philosophy: |
    YOU decide the best metaphor for each concept.
    Guidelines are suggestions, not rules.
    Prioritize: clarity > consistency > guidelines

  guidelines:
    - "日常生活で誰でも知っているものに例える（料理、学校、ゲームなど）"
    - "1つの概念に1つの比喩（混ぜると混乱する）"
    - "読者が「なるほど！」と思える身近な例を選ぶ"
    - "専門用語を使う場合は必ず直後に（）で日本語説明を入れる"
    - "略語は初出時にフルスペル＋日本語説明を必須とする"

  # 専門用語ルール
  terminology_rules:
    - "初出の専門用語は必ず「用語（読み方・日本語での意味）」形式で説明"
    - "例: API（エーピーアイ：アプリ同士が会話するための窓口）"
    - "例: Docker（ドッカー：アプリを箱詰めして持ち運べるようにするツール）"
    - "例: npm（エヌピーエム：Node.jsのパッケージ管理ツール）"
    - "2回目以降は説明なしでOK"

# =============================================================================
# 品質ルール（CURRICULUM_PLAN.md準拠）
# =============================================================================
quality_rules:
  max_code_lines: 25
  max_paragraph_sentences: 3
  require_filepath: true
  require_verification: true
  require_metaphor: true
  forbidden_words:
    - "同様に"
    - "残りも"
    - "以下略"
    - "簡単です"
    - "同じように"
  min_tables_per_day: 4
  min_screenshots: 3

# スクリーンショット撮影設定
screenshots:
  enabled: true
  output_dir: material/screenshots
  app_startup:
    command: "npm run dev"
    port: 3000
    wait_time_seconds: 30
    ready_pattern: "Ready in"
  headless: true
  filename_pattern: "{chapter_id}_{step_id}_{label}.png"
  metadata_file: "metadata.json"
  captures:
    # Day01用スクリーンショット（例）
    - id: "day01_step1"
      label: "localhost_top"
      url: "/"
      wait_for_selector: "body"
      viewport_width: 1280
      viewport_height: 720

# パス設定
paths:
  src_dir: "src"
  output_dir: "material/30days-curriculum"

# =============================================================================
# カリキュラム全体の方針
# =============================================================================
curriculum_approach:
  method: "教材だけで完結する自己完結型チュートリアル"
  principle: |
    学習者は教材を読み、指示通りにコードを入力するだけで
    アプリを完成させることができる。
    既存のコード（ZIP、clone、ダウンロード）は一切不要。
  important_rules:
    - "git clone、ZIP配布、テンプレート配布は一切しない"
    - "npx create-next-app から始めて、全て自分で書く"
    - "教材に書いてあるコードを入力すれば動く"
    - "外部リソース（配布物）への参照は禁止"
    - "各Dayで必要なコードは全て教材内に記載する"

# 30日間カリキュラム
chapters:
  # Week 1: 環境構築・基礎
  - id: "day01"
    title: "開発環境を整えて、初めてのアプリを動かそう"
    subtitle: "〜プログラミングの「キッチン」を準備する〜"
    what_you_will_make: "npx create-next-appで新規プロジェクトを作成し、ブラウザで表示"
    what_you_will_learn: "Node.js、npm、VS Code、Next.js、Tailwind CSS、開発サーバーの基本"
    topics: ["環境構築", "Node.js", "npm", "VS Code", "create-next-app", "Next.js dev server", "Tailwind CSS"]
    special_notes:
      - "npx create-next-app でゼロから新規プロジェクトを作成"
      - "git clone や ZIP配布は使用しない"
      - "教材の指示通りにコードを入力すれば動く"

  - id: "day02"
    title: "データに名札をつけて管理しよう"
    subtitle: "〜お弁当箱に「サンドイッチ」と書くように〜"
    what_you_will_make: "TypeScriptで変数や型を使ったデータ管理の練習"
    what_you_will_learn: "TypeScriptの変数宣言（const/let）と基本的な型の使い方"
    topics: ["TypeScript", "変数", "型", "const", "let", "基本的な型"]

  - id: "day03"
    title: "GitHubに保存しよう"
    subtitle: "〜コードのタイムマシンを手に入れる〜"
    what_you_will_make: "GitHubリポジトリにプロジェクトをpush"
    what_you_will_learn: "Gitの基本操作とGitHubへのpush方法"
    topics: ["Git", "GitHub", "push", "バージョン管理"]

  - id: "day04"
    title: "ネットに公開しよう"
    subtitle: "〜作ったアプリを世界中に見せる〜"
    what_you_will_make: "Vercelにデプロイして公開されたアプリ"
    what_you_will_learn: "Vercelへのデプロイと環境変数の設定"
    topics: ["Vercel", "デプロイ", "環境変数", "本番公開"]

  # Week 2: ログイン・認証
  - id: "day05"
    title: "ログイン画面のUIを作ろう"
    subtitle: "〜ユーザーが最初に出会う画面をデザインする〜"
    what_you_will_make: "react-hook-formとzodでバリデーション付きのログインフォーム"
    what_you_will_learn: "shadcn/uiフォームコンポーネント、react-hook-form、zodバリデーション"
    topics: ["react-hook-form", "zod", "shadcn/ui", "フォーム", "バリデーション", "ログイン画面"]

  - id: "day06"
    title: "ユーザー登録画面を作ろう"
    subtitle: "〜新しいユーザーを迎え入れる〜"
    what_you_will_make: "バリデーション付きのユーザー登録フォーム"
    what_you_will_learn: "登録フォームの実装、パスワード確認、zodスキーマの応用"
    topics: ["react-hook-form", "zod", "shadcn/ui", "ユーザー登録", "フォームバリデーション"]

  - id: "day07"
    title: "ログイン処理の仕組みを理解しよう"
    subtitle: "〜パスワードを安全に扱う裏側の仕組み〜"
    what_you_will_make: "カスタムJWT認証によるログイン処理（api.auth）"
    what_you_will_learn: "カスタムJWT認証の仕組み、jose、bcryptによるパスワードハッシュ化、tRPCのauthルーター"
    topics: ["カスタムJWT認証", "tRPC", "api.auth", "jose", "bcrypt", "パスワードハッシュ"]

  - id: "day08"
    title: "ログアウトとページ保護を実装しよう"
    subtitle: "〜ログインしてない人はここから先は通しまへんで〜"
    what_you_will_make: "ログアウト機能と認証ガードで保護されたページ"
    what_you_will_learn: "ログアウト処理、AppLayoutによる認証ガード、ページ保護の実装"
    topics: ["ログアウト", "ページ保護", "AppLayout", "認証ガード"]

  # Week 3: プロジェクト管理
  - id: "day09"
    title: "プロジェクト一覧画面を作ろう"
    subtitle: "〜タスクを整理するための箱を並べる〜"
    what_you_will_make: "プロジェクト一覧を表示する画面"
    what_you_will_learn: "tRPCでのデータ取得、Prismaクエリ、一覧表示の実装"
    topics: ["プロジェクト一覧", "tRPC", "Prisma", "データ取得", "一覧表示"]

  - id: "day10"
    title: "プロジェクト新規作成を実装しよう"
    subtitle: "〜新しいプロジェクトを立ち上げる〜"
    what_you_will_make: "プロジェクト新規作成フォームと作成処理"
    what_you_will_learn: "tRPCのmutation、Prismaでのデータ作成、フォーム送信処理"
    topics: ["プロジェクト作成", "tRPC mutation", "Prisma create", "フォーム"]

  - id: "day11"
    title: "プロジェクト編集・削除を実装しよう"
    subtitle: "〜プロジェクトを更新したり片付けたり〜"
    what_you_will_make: "プロジェクトの編集フォームと削除機能"
    what_you_will_learn: "Prismaのupdate/delete操作、確認ダイアログ、CRUD完成"
    topics: ["プロジェクト編集", "プロジェクト削除", "Prisma update", "Prisma delete", "CRUD"]

  - id: "day12"
    title: "メンバー追加を実装しよう"
    subtitle: "〜チームで一緒にプロジェクトを進める〜"
    what_you_will_make: "プロジェクトにメンバーを追加・管理する機能"
    what_you_will_learn: "メンバー管理、ロール制御、ProjectMemberの実装"
    topics: ["メンバー管理", "メンバー追加", "ロール管理", "ProjectMember"]

  # Week 4: タスク管理
  - id: "day13"
    title: "タスク一覧画面を作ろう"
    subtitle: "〜やることリストを一目で見渡す〜"
    what_you_will_make: "プロジェクト内のタスク一覧表示画面"
    what_you_will_learn: "タスクデータの取得と一覧表示、ステータス別の表示"
    topics: ["タスク一覧", "tRPC", "Prisma", "タスク表示"]

  - id: "day14"
    title: "タスク新規作成を実装しよう"
    subtitle: "〜やることを登録する〜"
    what_you_will_make: "TaskDialogを使ったタスク新規作成機能"
    what_you_will_learn: "タスク作成フォーム、TaskDialog、tRPC mutation"
    topics: ["タスク作成", "TaskDialog", "tRPC mutation", "フォーム"]

  - id: "day15"
    title: "タスク編集・削除を実装しよう"
    subtitle: "〜タスクの内容を更新したり完了にしたり〜"
    what_you_will_make: "タスクの編集フォームと削除機能"
    what_you_will_learn: "タスクのupdate/delete操作、CRUD完成"
    topics: ["タスク編集", "タスク削除", "CRUD", "Prisma update", "Prisma delete"]

  - id: "day16"
    title: "ステータス変更・タイマーを実装しよう"
    subtitle: "〜タスクの進み具合を管理する〜"
    what_you_will_make: "ステータス変更機能と作業時間を計測するタイマー"
    what_you_will_learn: "ステータス管理、タイマー実装、作業時間の記録"
    topics: ["ステータス変更", "タイマー", "作業時間計測", "状態管理"]

  - id: "day17"
    title: "自分のタスクページを作ろう"
    subtitle: "〜自分に割り当てられたタスクだけを見る〜"
    what_you_will_make: "ログインユーザーのタスクだけを表示するマイタスクページ"
    what_you_will_learn: "ユーザーフィルタリング、マイタスクビューの実装"
    topics: ["マイタスク", "フィルタリング", "個人ビュー", "assignee"]

  # Week 5: コメント・検索
  - id: "day18"
    title: "コメント投稿を実装しよう"
    subtitle: "〜タスクにメモや進捗報告を残す〜"
    what_you_will_make: "タスクにコメントを投稿できる機能"
    what_you_will_learn: "コメント投稿機能、tRPCでのコメントAPI実装"
    topics: ["コメント投稿", "コメント機能", "tRPC", "CRUD"]

  - id: "day19"
    title: "コメント編集・削除を実装しよう"
    subtitle: "〜自分のコメントを修正・取り消しする〜"
    what_you_will_make: "コメントの編集・削除機能（権限チェック付き）"
    what_you_will_learn: "コメントの編集・削除処理、権限チェックの実装"
    topics: ["コメント編集", "コメント削除", "権限チェック", "CRUD"]

  - id: "day20"
    title: "タスク検索機能を実装しよう"
    subtitle: "〜大量のタスクから目的のものをすぐ見つける〜"
    what_you_will_make: "キーワードやフィルターでタスクを検索できる機能"
    what_you_will_learn: "検索機能、フィルタリングの実装"
    topics: ["検索機能", "フィルタリング", "タスク検索"]

  # Week 6: レポート・ダッシュボード
  - id: "day21"
    title: "統計カードを表示しよう"
    subtitle: "〜数字でプロジェクトの全体像を把握する〜"
    what_you_will_make: "タスク数や完了率などの統計カードコンポーネント"
    what_you_will_learn: "ローカル集計によるデータ統計、統計カードUIの実装"
    topics: ["統計カード", "データ集計", "ローカル集計", "ダッシュボード"]

  - id: "day22"
    title: "グラフを表示しよう"
    subtitle: "〜データを視覚的に分かりやすくする〜"
    what_you_will_make: "Rechartsを使ったタスク統計グラフ"
    what_you_will_learn: "Rechartsの使い方、棒グラフ・円グラフの実装"
    topics: ["Recharts", "グラフ表示", "棒グラフ", "円グラフ", "データ可視化"]

  - id: "day23"
    title: "週次レポートを表示しよう"
    subtitle: "〜1週間の成果をまとめて振り返る〜"
    what_you_will_make: "週次レポート画面（api.report.getWeeklyReport）"
    what_you_will_learn: "週次レポートAPI、期間集計、レポート表示の実装"
    topics: ["週次レポート", "api.report.getWeeklyReport", "期間集計", "レポート"]

  # Week 7: ユーザー管理
  - id: "day24"
    title: "ユーザー一覧（管理者用）を作ろう"
    subtitle: "〜管理者だけが見れるユーザー管理画面〜"
    what_you_will_make: "管理者権限で閲覧できるユーザー一覧画面"
    what_you_will_learn: "管理者権限の判定、api.userルーター、ユーザー管理UIの実装"
    topics: ["ユーザー管理", "管理者権限", "api.user", "ユーザー一覧"]

  - id: "day25"
    title: "プロフィール編集を実装しよう"
    subtitle: "〜自分の情報を更新する〜"
    what_you_will_make: "プロフィール編集画面とパスワード変更機能"
    what_you_will_learn: "プロフィール更新処理、パスワード変更の実装"
    topics: ["プロフィール編集", "パスワード変更", "ユーザー情報更新"]

  # Week 8: 仕上げ・公開
  - id: "day26"
    title: "エラー対策・デバッグを学ぼう"
    subtitle: "〜バグを見つけて直す技術を身につける〜"
    what_you_will_make: "エラーハンドリングが実装されたアプリ"
    what_you_will_learn: "TRPCError、エラーハンドリング、デバッグ手法"
    topics: ["エラーハンドリング", "TRPCError", "デバッグ", "エラー対策"]

  - id: "day27"
    title: "セキュリティ対策を学ぼう"
    subtitle: "〜アプリを安全に守る〜"
    what_you_will_make: "セキュリティが強化されたアプリ"
    what_you_will_learn: "JWT認証、HttpOnly Cookie、protectedProcedure、bcryptの仕組み"
    topics: ["セキュリティ", "JWT", "HttpOnly Cookie", "protectedProcedure", "bcrypt"]

  - id: "day28"
    title: "テストを書こう"
    subtitle: "〜コードが正しく動くことを自動で確認する〜"
    what_you_will_make: "VitestとTesting Libraryで書いた自動テスト"
    what_you_will_learn: "Vitestの使い方、Testing Library、テストの書き方"
    topics: ["Vitest", "Testing Library", "テスト", "自動テスト"]

  - id: "day29"
    title: "最終調整・動作確認をしよう"
    subtitle: "〜公開前の最終チェックリスト〜"
    what_you_will_make: "型チェック・Lintを通した完成間近のアプリ"
    what_you_will_learn: "型チェック、Lint、最終調整の進め方"
    topics: ["型チェック", "Lint", "最終調整", "動作確認"]

  - id: "day30"
    title: "完成版を公開！卒業！"
    subtitle: "〜30日間の集大成を世界に届ける〜"
    what_you_will_make: "Vercelにデプロイされた完成版アプリ"
    what_you_will_learn: "最終デプロイ、30日間の振り返り、次のステップ"
    topics: ["Vercelデプロイ", "振り返り", "卒業", "次のステップ"]

